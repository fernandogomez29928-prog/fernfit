<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#141416"/>
      <stop offset="1" stop-color="#050506"/>
    </linearGradient>
    <radialGradient id="ring" cx="45%" cy="38%" r="65%">
      <stop offset="0" stop-color="#D63232"/>
      <stop offset="1" stop-color="#8C1414"/>
    </radialGradient>
    <!-- clip to only show pulse line inside the O ring -->
    <clipPath id="ringClip">
      <path d="M256,106 a150,150 0 1,1 -0.1,0 Z M256,166 a90,90 0 1,0 0.1,0 Z" fill-rule="evenodd"/>
    </clipPath>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect x="10" y="10" width="492" height="492" rx="104" fill="none" stroke="rgba(180,30,30,0.18)" stroke-width="2"/>

  <!-- O ring -->
  <circle cx="256" cy="256" r="150" fill="none" stroke="url(#ring)" stroke-width="60"/>

  <!-- Heartbeat / EKG line through the center of the O -->
  <polyline
    points="76,256 156,256 176,200 200,310 224,170 248,340 268,218 288,256 336,256 356,256 436,256"
    fill="none"
    stroke="#D63232"
    stroke-width="14"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.92"/>
</svg>
